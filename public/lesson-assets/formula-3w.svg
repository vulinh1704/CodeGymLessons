<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 410" fill="none">
  <rect width="640" height="410" fill="#f8fafc" rx="16"/>

  <!-- Title -->
  <text x="320" y="44" text-anchor="middle" fill="#1f2e73" font-size="15" font-weight="700" font-family="system-ui,sans-serif">Ghép 3 yếu tố → Prompt hoàn chỉnh</text>

  <!-- ── Card WHO ── -->
  <rect x="32" y="68" width="168" height="210" rx="12" fill="white" stroke="#c9d3ff" stroke-width="1.5"/>
  <rect x="32" y="68" width="168" height="6" rx="3" fill="#1f2e73"/>
  <!-- icon bg -->
  <circle cx="116" cy="116" r="30" fill="#eef2ff"/>
  <!-- person icon — head -->
  <circle cx="116" cy="107" r="11" fill="#1f2e73"/>
  <!-- person icon — shoulders -->
  <path d="M90 140 Q91 124 116 124 Q141 124 142 140" fill="#1f2e73"/>
  <!-- label -->
  <text x="116" y="162" text-anchor="middle" fill="#1f2e73" font-size="27" font-weight="800" font-family="system-ui,sans-serif">WHO</text>
  <text x="116" y="182" text-anchor="middle" fill="#6b7280" font-size="12" font-family="system-ui,sans-serif">Bạn là ai?</text>
  <rect x="48" y="196" width="136" height="1" fill="#e5e7eb"/>
  <text x="116" y="216" text-anchor="middle" fill="#374151" font-size="11.5" font-family="system-ui,sans-serif">Trình độ &amp; kinh nghiệm</text>
  <text x="116" y="233" text-anchor="middle" fill="#374151" font-size="11.5" font-family="system-ui,sans-serif">của bạn ảnh hưởng</text>
  <text x="116" y="250" text-anchor="middle" fill="#374151" font-size="11.5" font-family="system-ui,sans-serif">đến cách AI giải thích</text>

  <!-- arrow 1 -->
  <path d="M206 168 L232 168" stroke="#1f2e73" stroke-width="2.5" stroke-dasharray="4 3"/>
  <path d="M226 161 L234 168 L226 175" stroke="#1f2e73" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ── Card WHAT ── -->
  <rect x="238" y="68" width="168" height="210" rx="12" fill="white" stroke="#ffd1bc" stroke-width="1.5"/>
  <rect x="238" y="68" width="168" height="6" rx="3" fill="#ff6b35"/>
  <!-- lightbulb -->
  <circle cx="322" cy="110" r="26" fill="#fff4ed"/>
  <ellipse cx="322" cy="107" rx="11" ry="13" fill="#ff6b35"/>
  <rect x="315" y="120" width="14" height="6" rx="2.5" fill="#ff6b35"/>
  <rect x="317" y="126" width="10" height="4" rx="2" fill="#ff6b35"/>
  <line x1="305" y1="100" x2="298" y2="93" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="339" y1="100" x2="346" y2="93" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="302" y1="110" x2="295" y2="110" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="342" y1="110" x2="349" y2="110" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
  <!-- label -->
  <text x="322" y="162" text-anchor="middle" fill="#ff6b35" font-size="27" font-weight="800" font-family="system-ui,sans-serif">WHAT</text>
  <text x="322" y="182" text-anchor="middle" fill="#6b7280" font-size="12" font-family="system-ui,sans-serif">Muốn học gì?</text>
  <rect x="254" y="196" width="136" height="1" fill="#e5e7eb"/>
  <text x="322" y="216" text-anchor="middle" fill="#374151" font-size="11.5" font-family="system-ui,sans-serif">Chủ đề, khái niệm</text>
  <text x="322" y="233" text-anchor="middle" fill="#374151" font-size="11.5" font-family="system-ui,sans-serif">hoặc kỹ năng cụ thể</text>
  <text x="322" y="250" text-anchor="middle" fill="#374151" font-size="11.5" font-family="system-ui,sans-serif">bạn cần AI giải thích</text>

  <!-- arrow 2 -->
  <path d="M412 168 L438 168" stroke="#1f2e73" stroke-width="2.5" stroke-dasharray="4 3"/>
  <path d="M432 161 L440 168 L432 175" stroke="#1f2e73" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ── Card WAY ── -->
  <rect x="444" y="68" width="168" height="210" rx="12" fill="white" stroke="#a7f3d0" stroke-width="1.5"/>
  <rect x="444" y="68" width="168" height="6" rx="3" fill="#10b981"/>
  <!-- gear icon -->
  <circle cx="528" cy="110" r="26" fill="#ecfdf5"/>
  <circle cx="528" cy="110" r="13" fill="#10b981"/>
  <circle cx="528" cy="110" r="6" fill="white"/>
  <rect x="524.5" y="85" width="7" height="10" rx="2.5" fill="#10b981"/>
  <rect x="524.5" y="125" width="7" height="10" rx="2.5" fill="#10b981"/>
  <rect x="503" y="106.5" width="10" height="7" rx="2.5" fill="#10b981"/>
  <rect x="543" y="106.5" width="10" height="7" rx="2.5" fill="#10b981"/>
  <!-- label -->
  <text x="528" y="162" text-anchor="middle" fill="#10b981" font-size="27" font-weight="800" font-family="system-ui,sans-serif">WAY</text>
  <text x="528" y="182" text-anchor="middle" fill="#6b7280" font-size="12" font-family="system-ui,sans-serif">Học như thế nào?</text>
  <rect x="460" y="196" width="136" height="1" fill="#e5e7eb"/>
  <text x="528" y="216" text-anchor="middle" fill="#374151" font-size="11.5" font-family="system-ui,sans-serif">Phong cách, độ chi tiết</text>
  <text x="528" y="233" text-anchor="middle" fill="#374151" font-size="11.5" font-family="system-ui,sans-serif">và loại ví dụ bạn</text>
  <text x="528" y="250" text-anchor="middle" fill="#374151" font-size="11.5" font-family="system-ui,sans-serif">muốn nhận</text>

  <!-- ── Result box — taller, text split into 2 lines ── -->
  <rect x="52" y="302" width="536" height="88" rx="12" fill="#1f2e73"/>
  <text x="320" y="323" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="11" font-weight="700" font-family="system-ui,sans-serif">VÍ DỤ PROMPT HOÀN CHỈNH</text>
  <text x="320" y="348" text-anchor="middle" fill="white" font-size="12" font-family="system-ui,sans-serif">Tôi là người mới học lập trình (WHO). Tôi muốn học thẻ img (WHAT).</text>
  <text x="320" y="370" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12" font-family="system-ui,sans-serif">Hãy giải thích dễ hiểu và cho ví dụ thực tế (WAY).</text>
</svg>
