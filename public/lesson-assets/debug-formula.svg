<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 410" fill="none">
  <rect width="640" height="410" fill="#fff4ed" rx="16"/>

  <!-- Title -->
  <text x="320" y="40" text-anchor="middle" fill="#e85a1f" font-size="14" font-weight="700" font-family="system-ui,sans-serif">4 bước sửa lỗi với AI — hiểu nguyên nhân, không chỉ lấy kết quả</text>

  <!-- Layout: 4 equal cards × 132px + 3 arrows × 24px + margins 20px each = 640 -->
  <!-- Cards at x: 20, 176, 332, 488 — all width 132 -->

  <!-- ── Step 1: Paste code ── -->
  <rect x="20" y="60" width="132" height="168" rx="12" fill="white" stroke="#fecaca" stroke-width="1.5"/>
  <rect x="20" y="60" width="132" height="44" rx="12" fill="#fee2e2"/>
  <rect x="20" y="90" width="132" height="14" fill="#fee2e2"/>
  <!-- number circle -->
  <circle cx="44" cy="82" r="14" fill="#ef4444"/>
  <text x="44" y="87" text-anchor="middle" fill="white" font-size="13" font-weight="800" font-family="system-ui,sans-serif">1</text>
  <!-- step label — centered in remaining header space -->
  <text x="96" y="87" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="700" font-family="system-ui,sans-serif">DÁN CODE</text>
  <!-- code lines mock -->
  <rect x="34" y="116" width="104" height="8" rx="3" fill="#fca5a5"/>
  <rect x="34" y="130" width="80" height="8" rx="3" fill="#fca5a5" opacity="0.65"/>
  <rect x="34" y="144" width="92" height="8" rx="3" fill="#fca5a5" opacity="0.4"/>
  <!-- paste hint box -->
  <rect x="30" y="158" width="112" height="24" rx="5" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="86" y="174" text-anchor="middle" fill="#dc2626" font-size="10" font-weight="700" font-family="system-ui,sans-serif">← dán code của bạn</text>
  <!-- caption -->
  <text x="86" y="212" text-anchor="middle" fill="#6b7280" font-size="11" font-family="system-ui,sans-serif">Code bạn đang viết</text>

  <!-- arrow 1 -->
  <line x1="154" y1="144" x2="172" y2="144" stroke="#d1d5db" stroke-width="2" stroke-dasharray="4 3"/>
  <path d="M167 138 L175 144 L167 150" stroke="#d1d5db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ── Step 2: Describe error ── -->
  <rect x="176" y="60" width="132" height="168" rx="12" fill="white" stroke="#fde68a" stroke-width="1.5"/>
  <rect x="176" y="60" width="132" height="44" rx="12" fill="#fef3c7"/>
  <rect x="176" y="90" width="132" height="14" fill="#fef3c7"/>
  <circle cx="200" cy="82" r="14" fill="#f59e0b"/>
  <text x="200" y="87" text-anchor="middle" fill="white" font-size="13" font-weight="800" font-family="system-ui,sans-serif">2</text>
  <text x="252" y="87" text-anchor="middle" fill="#d97706" font-size="12" font-weight="700" font-family="system-ui,sans-serif">MÔ TẢ LỖI</text>
  <!-- warning triangle -->
  <path d="M242 118 L218 164 L266 164 Z" stroke="#f59e0b" stroke-width="2.5" fill="#fef9c3"/>
  <text x="242" y="153" text-anchor="middle" fill="#92400e" font-size="22" font-weight="800" font-family="system-ui,sans-serif">!</text>
  <!-- caption -->
  <text x="242" y="186" text-anchor="middle" fill="#374151" font-size="11" font-family="system-ui,sans-serif">Thông báo lỗi</text>
  <text x="242" y="201" text-anchor="middle" fill="#374151" font-size="11" font-family="system-ui,sans-serif">hoặc hành vi sai</text>
  <text x="242" y="216" text-anchor="middle" fill="#6b7280" font-size="10.5" font-family="system-ui,sans-serif">bạn quan sát được</text>

  <!-- arrow 2 -->
  <line x1="310" y1="144" x2="328" y2="144" stroke="#d1d5db" stroke-width="2" stroke-dasharray="4 3"/>
  <path d="M323 138 L331 144 L323 150" stroke="#d1d5db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ── Step 3: AI explains ── -->
  <rect x="332" y="60" width="132" height="168" rx="12" fill="white" stroke="#c9d3ff" stroke-width="1.5"/>
  <rect x="332" y="60" width="132" height="44" rx="12" fill="#eef2ff"/>
  <rect x="332" y="90" width="132" height="14" fill="#eef2ff"/>
  <circle cx="356" cy="82" r="14" fill="#1f2e73"/>
  <text x="356" y="87" text-anchor="middle" fill="white" font-size="13" font-weight="800" font-family="system-ui,sans-serif">3</text>
  <text x="408" y="87" text-anchor="middle" fill="#1f2e73" font-size="11" font-weight="700" font-family="system-ui,sans-serif">AI GIẢI THÍCH</text>
  <!-- robot face -->
  <circle cx="398" cy="136" r="24" fill="#eef2ff"/>
  <rect x="385" y="124" width="26" height="24" rx="6" fill="#1f2e73"/>
  <circle cx="392" cy="131" r="3.5" fill="white"/>
  <circle cx="405" cy="131" r="3.5" fill="white"/>
  <rect x="389" y="140" width="16" height="3.5" rx="1.5" fill="white"/>
  <!-- caption -->
  <text x="398" y="181" text-anchor="middle" fill="#374151" font-size="11" font-family="system-ui,sans-serif">Lỗi ở đây:</text>
  <text x="398" y="196" text-anchor="middle" fill="#374151" font-size="11" font-family="system-ui,sans-serif">vì sao sai</text>
  <text x="398" y="211" text-anchor="middle" fill="#374151" font-size="11" font-family="system-ui,sans-serif">và cách sửa</text>

  <!-- arrow 3 -->
  <line x1="466" y1="144" x2="484" y2="144" stroke="#d1d5db" stroke-width="2" stroke-dasharray="4 3"/>
  <path d="M479 138 L487 144 L479 150" stroke="#d1d5db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ── Step 4: Understand & fix — now same width as others ── -->
  <rect x="488" y="60" width="132" height="168" rx="12" fill="white" stroke="#a7f3d0" stroke-width="1.5"/>
  <rect x="488" y="60" width="132" height="44" rx="12" fill="#ecfdf5"/>
  <rect x="488" y="90" width="132" height="14" fill="#ecfdf5"/>
  <circle cx="512" cy="82" r="14" fill="#10b981"/>
  <text x="512" y="87" text-anchor="middle" fill="white" font-size="13" font-weight="800" font-family="system-ui,sans-serif">4</text>
  <text x="564" y="87" text-anchor="middle" fill="#065f46" font-size="11" font-weight="700" font-family="system-ui,sans-serif">HIỂU &amp; SỬA</text>
  <!-- checkmark circle -->
  <circle cx="554" cy="136" r="26" fill="#ecfdf5"/>
  <circle cx="554" cy="136" r="22" fill="white" stroke="#a7f3d0" stroke-width="1.5"/>
  <path d="M540 136 L550 147 L570 123" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- caption -->
  <text x="554" y="181" text-anchor="middle" fill="#065f46" font-size="11" font-weight="700" font-family="system-ui,sans-serif">Tự gõ lại code</text>
  <text x="554" y="196" text-anchor="middle" fill="#374151" font-size="11" font-family="system-ui,sans-serif">đã được sửa</text>
  <text x="554" y="211" text-anchor="middle" fill="#374151" font-size="11" font-family="system-ui,sans-serif">— không copy</text>

  <!-- ── Bottom callout ── -->
  <rect x="20" y="256" width="600" height="60" rx="12" fill="#ff6b35"/>
  <text x="320" y="279" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11" font-weight="700" font-family="system-ui,sans-serif">MỤC TIÊU QUAN TRỌNG NHẤT</text>
  <text x="320" y="301" text-anchor="middle" fill="white" font-size="12.5" font-family="system-ui,sans-serif">Đừng chỉ hỏi "Sửa giúp tôi" — hãy yêu cầu giải thích để không gặp lỗi đó lần thứ hai.</text>

  <!-- ── Tips — evenly spaced 3 columns ── -->
  <text x="44" y="342" fill="#374151" font-size="11" font-family="system-ui,sans-serif">✓  Dán toàn bộ code, không tóm tắt</text>
  <text x="256" y="342" fill="#374151" font-size="11" font-family="system-ui,sans-serif">✓  Mô tả lỗi thấy được</text>
  <text x="428" y="342" fill="#374151" font-size="11" font-family="system-ui,sans-serif">✓  Đọc giải thích trước khi sửa</text>

  <text x="44" y="366" fill="#374151" font-size="11" font-family="system-ui,sans-serif">✓  Yêu cầu giải thích tại sao sai</text>
  <text x="256" y="366" fill="#374151" font-size="11" font-family="system-ui,sans-serif">✓  Hỏi lại nếu chưa hiểu</text>
  <text x="428" y="366" fill="#374151" font-size="11" font-family="system-ui,sans-serif">✓  Tự gõ lại, không copy-paste</text>

  <text x="44" y="390" fill="#374151" font-size="11" font-family="system-ui,sans-serif">✓  Xác nhận đã hiểu lỗi</text>
  <text x="256" y="390" fill="#374151" font-size="11" font-family="system-ui,sans-serif">✓  Thử nghiệm lại sau khi sửa</text>
  <text x="428" y="390" fill="#374151" font-size="11" font-family="system-ui,sans-serif">✓  Ghi chú lỗi để nhớ sau</text>
</svg>
