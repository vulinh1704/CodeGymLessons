<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" fill="none">
  <!-- Background -->
  <rect width="640" height="420" fill="#eef2ff" rx="16"/>

  <!-- ── Left: chat window ── -->
  <rect x="36" y="32" width="258" height="356" rx="16" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- header bg -->
  <rect x="36" y="32" width="258" height="64" rx="16" fill="#1f2e73"/>
  <rect x="36" y="80" width="258" height="16" fill="#1f2e73"/>
  <!-- robot face -->
  <circle cx="68" cy="64" r="20" fill="rgba(255,255,255,0.15)"/>
  <rect x="58" y="54" width="20" height="20" rx="4" fill="white" opacity="0.9"/>
  <circle cx="63" cy="60" r="2.5" fill="#1f2e73"/>
  <circle cx="73" cy="60" r="2.5" fill="#1f2e73"/>
  <rect x="63" y="66" width="13" height="3" rx="1.5" fill="#1f2e73"/>
  <!-- header text -->
  <text x="98" y="60" fill="white" font-size="14" font-weight="700" font-family="system-ui,sans-serif">AI Trợ lý</text>
  <text x="98" y="78" fill="rgba(255,255,255,0.7)" font-size="11" font-family="system-ui,sans-serif">● Đang hoạt động</text>

  <!-- user msg 1 -->
  <rect x="158" y="110" width="116" height="36" rx="12" fill="#ff6b35"/>
  <text x="216" y="132" text-anchor="middle" fill="white" font-size="12" font-family="system-ui,sans-serif">HTML là gì?</text>

  <!-- AI response 1 -->
  <rect x="50" y="160" width="188" height="68" rx="12" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/>
  <text x="64" y="178" fill="#374151" font-size="11" font-family="system-ui,sans-serif">HTML là ngôn ngữ đánh dấu</text>
  <text x="64" y="195" fill="#374151" font-size="11" font-family="system-ui,sans-serif">dùng để tạo cấu trúc trang</text>
  <text x="64" y="212" fill="#374151" font-size="11" font-family="system-ui,sans-serif">web. Ví dụ: &lt;h1&gt;, &lt;p&gt;...</text>

  <!-- user msg 2 -->
  <rect x="130" y="244" width="144" height="48" rx="12" fill="#ff6b35"/>
  <text x="202" y="264" text-anchor="middle" fill="white" font-size="11" font-family="system-ui,sans-serif">Cho ví dụ và bài tập</text>
  <text x="202" y="282" text-anchor="middle" fill="white" font-size="11" font-family="system-ui,sans-serif">thực hành nhé</text>

  <!-- AI typing -->
  <rect x="50" y="308" width="80" height="36" rx="12" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="72" cy="326" r="4" fill="#9ca3af"/>
  <circle cx="86" cy="326" r="4" fill="#9ca3af" opacity="0.55"/>
  <circle cx="100" cy="326" r="4" fill="#9ca3af" opacity="0.25"/>

  <!-- ── Right: 24/7 panel ── -->
  <rect x="334" y="60" width="270" height="300" rx="16" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Clock face -->
  <circle cx="469" cy="178" r="72" fill="#eef2ff"/>
  <circle cx="469" cy="178" r="62" fill="white" stroke="#1f2e73" stroke-width="3"/>
  <!-- Hour marks -->
  <circle cx="469" cy="122" r="3.5" fill="#1f2e73"/>
  <circle cx="469" cy="234" r="3.5" fill="#1f2e73"/>
  <circle cx="413" cy="178" r="3.5" fill="#1f2e73"/>
  <circle cx="525" cy="178" r="3.5" fill="#1f2e73"/>
  <!-- Minute hand (12) -->
  <line x1="469" y1="178" x2="469" y2="126" stroke="#1f2e73" stroke-width="4" stroke-linecap="round"/>
  <!-- Hour hand (pointing ~9) -->
  <line x1="469" y1="178" x2="431" y2="178" stroke="#ff6b35" stroke-width="4" stroke-linecap="round"/>
  <!-- Center -->
  <circle cx="469" cy="178" r="5" fill="#1f2e73"/>

  <!-- 24/7 badge -->
  <rect x="399" y="267" width="140" height="46" rx="23" fill="#ff6b35"/>
  <text x="469" y="297" text-anchor="middle" fill="white" font-size="24" font-weight="800" font-family="system-ui,sans-serif">24/7</text>

  <text x="469" y="333" text-anchor="middle" fill="#6b7280" font-size="13" font-family="system-ui,sans-serif">Luôn sẵn sàng hỗ trợ</text>
  <text x="469" y="351" text-anchor="middle" fill="#6b7280" font-size="13" font-family="system-ui,sans-serif">không ngại câu hỏi lặp</text>
</svg>
