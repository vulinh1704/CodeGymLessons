<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="1" dy="1" stdDeviation="0.8" flood-color="#0d0d1a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!--
    Default arrow cursor shape, tip at (2,1) — hotspot (2,1).
    Points (clockwise): tip → down left edge → notch → tail → close.
  -->
  <polygon
    points="2,1 2,20 6,15 10,25 12,24 8,14 14,14"
    fill="#F9A8C9"
    stroke="#1E293B"
    stroke-width="1.4"
    stroke-linejoin="round"
    paint-order="stroke fill"
    filter="url(#sh)"
  />

  <!-- Subtle inner highlight along left edge -->
  <line x1="3.2" y1="2.5" x2="3.2" y2="17"
        stroke="#fff" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
</svg>
